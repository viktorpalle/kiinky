  <path d="M 66 118 Q 100 126 134 118" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3" stroke-linecap="round"/>
  <!-- Center line -->
  <ellipse cx="100" cy="100" rx="42" ry="2.5" fill="#0D0D1A" opacity="0.6"/>
