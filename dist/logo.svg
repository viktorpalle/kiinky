<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="44" fill="#0D0D1A"/>
  <defs>
    <linearGradient id="lipsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3366"/>
      <stop offset="50%" style="stop-color:#9D4EDD"/>
      <stop offset="100%" style="stop-color:#FF3366"/>
    </linearGradient>
    <linearGradient id="lipsGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C04499"/>
      <stop offset="50%" style="stop-color:#7B2FBE"/>
